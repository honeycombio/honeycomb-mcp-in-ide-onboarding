# Honeycomb Learning Progress
# This file tracks your learning progress across all paths. The AI assistant updates it automatically.
# You can also edit it manually if needed.

# --- MCP Connection Status ---

# Is the Honeycomb MCP connected?
mcp_connected: false

# Is MCP setup pending (waiting for user to restart and authenticate)?
mcp_setup_pending: false

# --- Overall Learning Status ---

# Has the user started learning? (Set to true when first path begins)
started: false

# Has the user completed core learning?
# Set to true once user has completed at least ONE path and learned core concepts:
# - traces, spans, queries, and either (SLOs OR BubbleUp)
completed: false

# --- Learning Paths Progress ---

# Track progress for each of the 3 learning paths
# Users can complete multiple paths - they're independent
paths:
  debugging:
    started: false      # Set true when user begins this path
    completed: false    # Set true when user finishes a successful debugging session
    last_step: null     # Track the last step within this path (optional)

  exploring:
    started: false
    completed: false
    last_step: null

  reliability:
    started: false
    completed: false
    last_step: null

# --- Concepts Learned ---

# Concepts the user has learned (AI won't re-explain these)
# These are shared across all paths
# Example: ["traces", "spans", "heatmaps", "queries", "bubbleup"]
concepts_learned: []

# --- Session Timestamps ---

# Timestamp of first learning session
first_session: null

# Timestamp of most recent session
last_session: null

# --- Optional: Manual Overrides ---

# If you're already experienced with Honeycomb, you can skip learning:
# 1. Set completed: true
# 2. Set all paths you're comfortable with to completed: true
# 3. Add all concepts to concepts_learned

# Example for experienced users:
# completed: true
# paths:
#   debugging:
#     completed: true
#   exploring:
#     completed: true
#   reliability:
#     completed: true
# concepts_learned:
#   - traces
#   - spans
#   - heatmaps
#   - queries
#   - percentiles
#   - slos
#   - slis
#   - error_budgets
#   - burn_rate
#   - bubbleup
#   - baselines
#   - data_model
